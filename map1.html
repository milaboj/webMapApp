<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Choropleth map of the covid-19 rates</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&display=swap" rel="stylesheet">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.8.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.8.1/mapbox-gl.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
        }

        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }

        /* the layout of the legend panel */
        #legend {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 110px;
            background: #fff;
            margin-right: 20px;
            margin-bottom: 40px;
            padding: 10px 20px 10px 10px;
            border-radius: 3px;
            text-align: center;
            font-family: 'Open Sans', sans-serif;
        }

        /* each line for a break */
        .break {
            position: relative;
            margin: 0px;
            padding: 0px;
        }

        /* basic style for a dot/circle */
        .dot {
            display: inline-block;
            margin-top: 5px;
            border-radius: 50%;
            opacity: 0.6;
        }

        /* the label for the dot */
        .dot-label {
            position: absolute;
            top: 0;
            right: 0;
            font-style: italic;
        }

        /* the text color of a hyper link */
        a {
            color: black
        }
        #map-info {
            position: absolute;
            top: 10px;           /* distance from top of map */
            left: 10px;          /* distance from left of map */
            max-width: 300px;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 10px 15px;
            border-radius: 5px;
            font-family: 'Open Sans', sans-serif;
            font-size: 14px;
            line-height: 1.4;
            z-index: 1;          /* ensures it’s on top of the map */
            box-shadow: 0 1px 5px rgba(0,0,0,0.3);
        }
        #map-info h2 {
            margin: 0 0 5px 0;
            font-size: 16px;
        }
        #map-info p {
            margin: 5px 0;
        }
        #map-info a {
            color: #0074D9;
            text-decoration: none;
        }
        #map-info a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div id="map-info">
        <h1>COVID-19 Rates in the US, 2020</h1>
        <p>This map shows COVID-19 case rates per 1,000 residents for US counties during 2020.</p>
        <p><strong>Users:</strong> Public health analysts, students, and researchers.</p>
        <p><strong>Data Source:</strong> 
            <a href="https://github.com/nytimes/covid-19-data">NY Times COVID-19 Data</a>
        </p>
    </div>
    <div id="map"></div>
    <div id="legend"></div>
    <script>
        mapboxgl.accessToken =
            'pk.eyJ1IjoibWlsYWJvIiwiYSI6ImNsbnFjbG9xZTB0MmIya3B0eDFwNDEwY3gifQ.9SzpYF3dZCwahgWShbsRiQ';
        let map = new mapboxgl.Map({
            container: 'map', // container ID
            style: 'mapbox://styles/mapbox/dark-v10',
            zoom: 4, // starting zoom
            minZoom: 2, // minimum zoom level of the map
            center: [-94, 39] // starting center
        });
        const grades = [4, 5, 6],            
            radii = [5, 15, 20];
        
        async function geojsonFetch() { 
            let response = await fetch('assets/us-covid-2020-rates.json');
            let covidRates = await response.json();
            map.addSource('covidRates', {
                    type: 'geojson',
                    data: covidRates
                });

                map.addLayer({
                    id: 'covidRates-layer',
                    type: 'fill',
                    source: 'covidRates',
                    paint: {
                        'fill-color': [
                            'step',
                            ['get', 'rates'],
                            '#FFEDA0',
                            10, '#FED976',
                            20, '#FEB24C',
                            50, '#FD8D3C',
                            100, '#FC4E2A',
                            200, '#E31A1C',
                            500, '#BD0026',
                            1000, '#800026'
                        ],
                        'fill-outline-color': '#BBBBBB',
                        'fill-opacity': 0.7,
                    }
                });
            map.on('load', () => { 
            map.on('mouseenter', 'covidRates-layer', () => {
                map.getCanvas().style.cursor = 'pointer';
            });
            map.on('mouseleave', 'covidRates-layer', () => {
                map.getCanvas().style.cursor = '';
            }); 
            map.on('click', 'covidRates-layer', (event) => {
                // Get the first feature under the click
                const feature = event.features[0];

                // Get properties you want to show
                const countyName = feature.properties.county; // adjust if your property is named differently
                const stateName = feature.properties.state;
                const rates = feature.properties.rates;

                // Create a popup
                new mapboxgl.Popup()
                    .setLngLat(event.lngLat) // the click location
                    .setHTML(`
                        <strong>${countyName}, ${stateName}</strong><br>
                        COVID-19 Rate: ${rates} per 1,000 people
                    `)
                    .addTo(map);
            });   
                
            });
        }
        
        geojsonFetch();

        // create legend
        const legend = document.getElementById('legend');
        const layers = [
        '0–10', '10–20', '20–50', '50–100',
        '100–200', '200–500', '500–1000', '1000+'
        ];
        const colors = [
        '#FFEDA0', '#FED976', '#FEB24C', '#FD8D3C',
        '#FC4E2A', '#E31A1C', '#BD0026', '#800026'
        ];
        // Add title
        const title = document.createElement('strong');
        title.innerText = 'Covid-19 Rates per 1,000 residents';
        legend.appendChild(title);
        // Add color boxes and labels
        layers.forEach((layer, i) => {
            const item = document.createElement('div');
            const key = document.createElement('span');
            key.style.backgroundColor = colors[i];
            key.style.display = 'inline-block';
            key.style.width = '15px';
            key.style.height = '15px';
            key.style.marginRight = '5px';
            const value = document.createElement('span');
            value.innerText = layer;
            item.appendChild(key);
            item.appendChild(value);
            legend.appendChild(item);
        });

const source = document.createElement('p');
source.style.textAlign = 'right';
source.style.fontSize = '10pt';
source.innerHTML = 'Source: <a href="https://github.com/nytimes/covid-19-data">NYTimes</a>';
legend.appendChild(source);
    </script>

</body>

</html>
